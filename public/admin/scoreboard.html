<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 挑战赛 - 计分大屏</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
    .scoreboard {
      height: 100vh; display: flex; flex-direction: column;
      padding: 1.5rem 2.5rem; position: relative; z-index: 1;
    }
    .sb-header { text-align: center; margin-bottom: 1rem; flex-shrink: 0; }
    .sb-title {
      font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900;
      background: var(--gradient-main);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .sb-subtitle { color: var(--text-secondary); font-size: 1rem; margin-top: 0.25rem; }

    /* Scrollable table area */
    .sb-table-wrapper {
      flex: 1; overflow: hidden; position: relative;
      mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 3%, black 97%, transparent 100%);
    }
    .sb-table {
      transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .sb-row {
      display: grid;
      grid-template-columns: 60px 120px 1fr repeat(4, 80px) 100px;
      align-items: center;
      padding: 0.7rem 1.2rem;
      margin-bottom: 0.5rem;
      border-radius: var(--radius-md);
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .sb-row-header {
      background: transparent; padding: 0.5rem 1.2rem; margin-bottom: 0.25rem;
      color: var(--text-muted); font-size: 0.8rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
    }
    .sb-row-data { background: var(--bg-card); border: var(--border-glass); }

    /* Top 3 styling */
    .sb-row-data.rank-1 {
      border-color: rgba(255, 215, 0, 0.5);
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.12), rgba(255, 165, 0, 0.06));
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.15);
    }
    .sb-row-data.rank-2 {
      border-color: rgba(192, 192, 192, 0.4);
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.1), rgba(169, 169, 169, 0.05));
    }
    .sb-row-data.rank-3 {
      border-color: rgba(205, 127, 50, 0.3);
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.08), rgba(184, 115, 51, 0.04));
    }

    .sb-rank { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; }
    .sb-group { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; }
    .sb-bar-container { padding: 0 0.75rem; }
    .sb-bar {
      height: 18px; border-radius: 9px; background: var(--gradient-main);
      transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 4px; position: relative; overflow: hidden;
    }
    .sb-bar::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { 100% { left: 200%; } }

    .sb-game-score {
      text-align: center; font-family: 'Orbitron', sans-serif;
      font-size: 0.95rem; font-weight: 600; color: var(--text-secondary);
    }
    .sb-total {
      text-align: right; font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem; font-weight: 900; color: var(--neon-purple);
    }
    .sb-footer {
      text-align: center; padding: 0.75rem; color: var(--text-muted);
      font-size: 0.8rem; flex-shrink: 0;
    }

    .crown { font-size: 1.5rem; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute; bottom: 0.5rem; right: 2rem;
      display: flex; align-items: center; gap: 0.5rem;
      color: var(--text-muted); font-size: 0.75rem;
      opacity: 0; transition: opacity 0.3s;
    }
    .scroll-indicator.visible { opacity: 1; }
    .scroll-arrow {
      animation: scrollArrow 1.5s ease-in-out infinite;
      font-size: 1rem;
    }
    @keyframes scrollArrow {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(4px); opacity: 1; }
    }

    /* Score change animation */
    @keyframes scoreFlash {
      0% { color: var(--neon-purple); }
      25% { color: #22c55e; transform: scale(1.2); }
      75% { color: #22c55e; transform: scale(1.1); }
      100% { color: var(--neon-purple); transform: scale(1); }
    }
    .score-changed { animation: scoreFlash 1s ease-out; }
  </style>
</head>
<body>
  <div class="scoreboard">
    <div class="sb-header">
      <div class="sb-title">🏆 AI 挑战赛 实时排行榜</div>
      <div class="sb-subtitle" id="updateTime">实时更新中...</div>
    </div>

    <div class="sb-row sb-row-header">
      <div>排名</div>
      <div>组号</div>
      <div></div>
      <div style="text-align:center">🎬</div>
      <div style="text-align:center">👤</div>
      <div style="text-align:center">🎨</div>
      <div style="text-align:center">✏️</div>
      <div style="text-align:right">总分</div>
    </div>

    <div class="sb-table-wrapper" id="tableWrapper">
      <div class="sb-table" id="scoreRows"></div>
    </div>

    <div class="scroll-indicator" id="scrollIndicator">
      <span class="scroll-arrow">⬇</span> 自动滚动中
    </div>

    <div class="sb-footer">
      AI 挑战赛 — 实时计分系统 | <span id="clock"></span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const adminPw = localStorage.getItem('adminPassword');
    const headers = { 'x-admin-password': adminPw || '' };
    const socket = io();
    socket.emit('join-admin');

    const medals = ['🥇', '🥈', '🥉'];
    let maxScore = 1;
    let prevScores = {};

    // ===== Auto Scroll Logic =====
    let scrollOffset = 0;
    let scrollDirection = 1; // 1 = down, -1 = up
    let scrollPaused = false;
    let scrollTimer = null;

    function autoScroll() {
      const wrapper = document.getElementById('tableWrapper');
      const table = document.getElementById('scoreRows');
      const indicator = document.getElementById('scrollIndicator');

      if (!wrapper || !table) return;

      const wrapperHeight = wrapper.clientHeight;
      const tableHeight = table.scrollHeight;
      const overflow = tableHeight - wrapperHeight;

      if (overflow <= 0) {
        // All content fits — no scrolling needed
        table.style.transform = 'translateY(0)';
        indicator.classList.remove('visible');
        return;
      }

      indicator.classList.add('visible');

      if (scrollPaused) return;

      // Scroll step
      scrollOffset += scrollDirection * 1; // 1px per tick

      if (scrollOffset >= overflow) {
        scrollOffset = overflow;
        scrollDirection = -1;
        scrollPaused = true;
        setTimeout(() => { scrollPaused = false; }, 2000); // Pause 2s at bottom
      } else if (scrollOffset <= 0) {
        scrollOffset = 0;
        scrollDirection = 1;
        scrollPaused = true;
        setTimeout(() => { scrollPaused = false; }, 3000); // Pause 3s at top
      }

      table.style.transform = `translateY(-${scrollOffset}px)`;
    }

    // Start auto-scroll at 30fps
    setInterval(autoScroll, 33);

    // ===== Score Loading =====
    async function loadScores() {
      try {
        const res = await fetch('/api/admin/scores', { headers });
        const scores = await res.json();
        maxScore = Math.max(scores[0]?.total || 1, 1);

        const container = document.getElementById('scoreRows');
        container.innerHTML = '';

        scores.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = `sb-row sb-row-data${i < 3 ? ' rank-' + (i + 1) : ''}`;
          const barWidth = (s.total / maxScore) * 100;

          // Detect score changes
          const prevTotal = prevScores[s.groupId] || 0;
          const changed = prevTotal !== s.total && prevTotal > 0;

          row.innerHTML = `
            <div class="sb-rank">${medals[i] || (i + 1)}</div>
            <div class="sb-group">${i === 0 ? '<span class="crown">👑</span> ' : ''}第 ${s.groupId} 组</div>
            <div class="sb-bar-container">
              <div class="sb-bar" style="width: ${barWidth}%"></div>
            </div>
            <div class="sb-game-score">${s.game1}</div>
            <div class="sb-game-score">${s.game2}</div>
            <div class="sb-game-score">${s.game3}</div>
            <div class="sb-game-score">${s.game4}</div>
            <div class="sb-total${changed ? ' score-changed' : ''}">${s.total}</div>
          `;
          container.appendChild(row);

          prevScores[s.groupId] = s.total;
        });

        document.getElementById('updateTime').textContent = `最后更新: ${new Date().toLocaleTimeString('zh-CN')}`;
      } catch (e) {
        console.error('Error:', e);
      }
    }

    // Clock
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('zh-CN');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Socket events
    socket.on('submission-update', () => loadScores());
    socket.on('game-state-update', () => loadScores());

    // Auto refresh every 5 seconds
    setInterval(loadScores, 5000);
    loadScores();
  </script>
</body>
</html>
